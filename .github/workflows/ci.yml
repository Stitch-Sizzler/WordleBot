name: Wordle Entropy AI CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Dependencies
      run: npm install

    - name: Compile C Engine
      run: make solver

    - name: Test C Binary Execution
      run: ./solver wordle-La.txt wordle-Ta.txt